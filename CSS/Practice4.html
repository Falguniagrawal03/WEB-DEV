<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise-6(Navbar using flexbox)</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .container{
            position: relative;
            display: flex;
            margin: 0;
            width: 83vw;
            top: 10px;
            padding: 10px;
        }
        nav{
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .right{
            list-style-type: none;
            display: flex;
            justify-content: flex-end;
            margin-left: auto;
            gap: 40px;
            margin-top: 20px;
            margin-right: 55px;
        }
        .right li{
            font-size: large;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            opacity: 0.7;
        }
        .heading{
            text-align: center;
             margin-top: 70px;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
            Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue",
            sans-serif;
            font-size: 50px;
            font-weight: 350; 
        }
        main{
            text-align: center;
        }
        main p{
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: x-large;
            margin: 20px auto 30px auto;
        }
        .box{
            height: 50px;
            width: 350px;
            border: 0px none;
            border-radius: 10px;
            background-color: #00b6d1;
            margin-left: auto;
            margin-right: auto;
            margin-bottom: 60px;
        }
        .box div{
            padding: 15px;
            font-family: sans-serif;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: -0.5px;
            color: white;
        }
    </style>
</head>
<body>
    <nav>
        <div class="container">
            <img src="https://www.ultraedit.com/wp-content/uploads/2023/01/UE-logo.svg", alt="logo">

            <ul class="right">
                <li class="products">Products</li>
                <li class="pricing">Pricing</li>
                <li class="resources">Resources</li>
                <li class="about">About Us</li>
                <li class="security">Security and Compliances</li>
            </ul>
        </div>
    </nav>
    <header>
        <div class="heading">Download <b>UltraEdit</b> for Windows</div>
    </header>
    <main>
        <p>Download and try UltraEdit before you buy it! This download includes the full Windows<br>version of the text editor.</p>
        <div class="box">
            <div>DOWNLOAD MAC OR LINUX VERSION</div>
        </div>
    </main>
</body>
</html>
