<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>smiley face</title>
    <style>
        .face{
            height: 400px;
            width: 400px;
            background-color: yellow;
            border-radius: 50%;
        }
        .left_eye , .right_eye{
            height: 70px;
            width: 70px;
            background-color: black;
            border-radius: 50%;
            display: inline-block;
            position:absolute;
            left:100px;
            top:100px;
        }
        .mouth{
            height: 80px;
            width: 200px;
            background-color: red;
            border-radius: 0px 0px 50px 50px;
            position:absolute;
            top: 250px;
            left: 100px;
        }
        .right_eye{
            left:250px;
        }
    </style>
</head>
<body>
    <div class="face">
        <div class="eyes">
            <div class="left_eye"></div>
            <div class="right_eye"></div>
        </div>
        <div class="mouth"></div>
    </div>
</body>
</html>
