<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #main{
            height: 500px;
            border: 2px solid red;
            display:grid;
            grid-template-columns: 200px 200px 200px;
            grid-template-rows: 200px 200px;
        }
        #main div{
            border: 2px solid yellow;
        }
        #one{
            background-color: rgb(198, 40, 127);
            grid-column: 2/3;
        }
        #five{
            background-color: aqua;
        }
    </style>
</head>
<body>
    <div id="main">
        <div id="one"> 1</div>
        <div id="two"> 2</div>
        <div id="three"> 3</div>
        <div id="four"> 4</div>
        <div id="five"> 5</div>
        <div id="six"> 6</div>

    </div>
</body>
</html>
