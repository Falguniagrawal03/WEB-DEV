<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            height:300px;
            width: 300px;
            background-color: aqua;
        }
        div:hover{
            animation-name: anim;
            animation-duration: 5s;
            animation-iteration-count: 2;
            animation-direction: alternate
        }
        @keyframes anim{
            0%{
                height: 400px;
                width: 350px;
                background-color: blueviolet;
            }
            30%{
                height:50vh;
                width: 50vw;
                background-color: rgb(72, 5, 36);
            }
            60%{
                height:80vh;
                width:80vw;
                background-color: rgb(232, 55, 24);
                border-radius: 50%;
                
            }
            100%{
                height: 100vh;
                width:100vw;
                background-color: rgb(11, 133, 46);
            }
        }
    </style>
</head>
<body>
    <div></div>
</body>
</html>
