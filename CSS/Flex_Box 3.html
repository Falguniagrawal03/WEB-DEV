<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS 5 Assignment</title>
    <style>
        #container{
            height: 400px;
            width: 400px;
            border: 2px solid lightseagreen;
            background-color: white;
            border-radius: 10px;
            align-items: center;
            display: flex;
            justify-content: space-evenly;
            flex-wrap: wrap;
            margin: 100px auto;
        }
        .Box{
            height: 100px;
            width: 100px;
            border: 2px solid black;
            background-color: rgb(252, 255, 47);
            border-radius: 5px;
            text-align: center;
            font-size: 50px;
        }
    </style>
</head>
<body>
    <div id="container">
        <div class="Box">A</div>
        <div class="Box">B</div>
        <div class="Box">C</div>
        <div class="Box">D</div>
        <div class="Box">E</div>
        <div class="Box">F</div>
        <div class="Box">G</div>
        <div class="Box">H</div>
        <div class="Box">I</div>
    </div>
</body>
</html>
