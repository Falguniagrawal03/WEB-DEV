<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise-5(Layout Design)</title>
    <style>
        body{
            background-color: rgb(197, 203, 203);
        }
        *{
            margin: 0;
            padding: 0;
            font-family: "Poppins", sans-serif;
        }
        header{
            position: sticky;
            top: 0;
        }
        nav{
            background-color: yellow;
            padding: 12px 0;
        }
        ul li{
            list-style: none;
            display: inline;
            padding: 25px;
            font-weight: bolder;
            color: black;
        }
        ul li a{
            text-decoration: none;
        }
        .main_box{
            background-color: aquamarine;
            margin: 12px;
            height: 500px;
            border: 2px solid black;
            display: flex;
            justify-content: center;
        }
        .box1{
            background-color: palevioletred;
            width: 50vh;
            margin: 50px;
            border: 2px solid black;
        }
        .box2{
            background-color: skyblue;
            width: 50vh;
            margin: 50px;
            border: 2px solid black;
          
        }
        .content{
            background-color: burlywood;
            color: black;
            padding: 40px;
            margin: 12px;
            border: 2px solid black;
            border-radius: 80px;
            text-align: center;
            font-size: 50px;
        }
        .logo{
           display: flex;
           justify-content: end;
           position: fixed;
           z-index: 1;
           right: 10px;
           bottom: 10px;
        }
        footer{
            background-color: azure;
            color: black;
            border: 2px solid black;
            height: 50px;
            margin: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            top: 100px;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="/">About</a></li>
                <li><a href="/">Services</a></li>
                <li><a href="/">Contact us</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="main_box">
            <div class="box1"></div>
            <div class="box2"></div>
        </div>
        <div class="content">
            <p>Welcome to Sigma Web Development Express</p>
        </div>
        <div class="logo">
            <img src="https://media.licdn.com/dms/image/v2/D560BAQFDMa4ihWqOUw/company-logo_200_200/B56Z2gbOxDKIAI-/0/1776512987322/cwhofficial_logo?e=2147483647&v=beta&t=-Nj7WV80D3Q7TZSWY_NMRC12vzqyG2pJKPgnFClypRQ" alt="logo" height="70">
        </div>
        <footer>
            <div>This is the footer</div>
        </footer> 
    </main>
</body>
</html>
