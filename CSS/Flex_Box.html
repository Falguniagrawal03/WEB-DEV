<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex_Box</title>
    <style>
        h1{
            text-align: center;
        }
        #container{
            height: 600px;
            width: 80%;
            background-color: azure;
            border: 2px solid black;
            margin: 20px auto;
            display: flex;
            flex-direction: row;
            /* flex-direction: row/column/column-reverse/row-reverse; */  
            justify-content: flex-start;
            /* justify-content: flex-start/flex-end/center/space-around/space-between/space-evenly; */  
            flex-wrap: wrap;
            /* flex-wrap: nowrap/wrap/wrap-reverse; */
            align-items: baseline;  
            /* align-items: flex-start/flex-end/center/baseline; */
            align-content: flex-start;
            /* align-content: flex-start/flex-end/center/space-around/space-between/space-evenly; */
        }
        #container div{
            height: 50px;
            width: 300px;
            color: white;
            text-align: center;
            font-size: 1.5em;
        }
        #org{
            align-self: flex-start;
            flex-basis: 50px;
        }
    </style>
</head>
<body>
    <h1>Flex Playground</h1>
    <div id="container">
        <div style="background-color: violet;">Violet</div>
        <div style="background-color: indigo;">Indigo</div>
        <div style="background-color: blue; height: 40px;">Blue</div>
        <div style="background-color: green;">Green</div>
        <div style="background-color: yellow;">yellow</div>
        <div 
        id="org"
        style="background-color: orange; height: 200px; font-size: 3em;">Orange</div>
        <div style="background-color: red;">Red</div>
    </div>
</body>
</html>
