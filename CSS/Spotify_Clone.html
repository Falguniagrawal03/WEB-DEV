<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="icon" href="./Assets/logo.png">
    <title>Spotify - Web Player : Music for everyone</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
    body{
        font-family: "Montserrat", sans-serif;
        margin: 0;
        background-color: #000;
        color: #fff;
        overflow: hidden;
    }
    .main{
        display: flex;
        height: 100vh;
        padding: 0.5rem;
    }

    .sidebar{
        background-color: black;
        width: 340px;
        border-radius: 1rem;  /*16px*/
        margin-right: 0.5rem;
    }

    .main-content{
        background-color: #121212; 
        flex: 1;
        border-radius: 1rem;
        overflow: auto;
    }

    .music-player{
        background-color: black;
        position: fixed;
        bottom: 0%;
        width: 100%;
        height: 72px;
    }

    a{
        text-decoration: none;
        color: white;
    }
    .nav{
        background-color: #121212;
        border-radius: 1rem;
        display: flex;
        flex-direction: column;
        justify-content: center;
        height: 100px;
        padding: 0.5rem 0.75rem;
    }
    .nav-option{
        line-height: 2.5rem;
        opacity: 0.7;
        padding: 0.5rem 0.75rem;
    }
    .nav-option:hover{
        opacity: 1;
    }
    .nav-option i{
        font-size: 1.25rem;
    }
    .nav-option a{
        font-size: 1rem;
        margin-left: 1rem;
    }

    .library{
        background-color: #121212;
        border-radius: 1rem;
        height: 100%;
        margin-top: 0.75rem;
        padding: 0.5rem 0.75rem;
    }
    .options{
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .lib-options img{
        height: 1.25rem;
        width: 1.25rem;
    }
    .icons{
        font-size: 1.25rem;
        display: flex;
    }
    .icons i{
        opacity: 0.7;
        margin-right: 1rem;
    }
    .icons i:hover{
        opacity: 1;
    }
    .box{
        height: 8rem;
        background-color: #232323;
        border-radius: 0.75rem;
        margin: 0.75rem 0 1.75rem 0;     /*top right bottom left*/
        padding: 0.75rem 1rem;
    }
    .box_p1{
        font-size: 1rem;
        font-weight: 500;
    }.box_p2{
        font-size: 0.85rem;
        opacity: 0.9;
    }
    .badge{
        background-color: #fff;
        border: none;
        border-radius: 100px;
        padding: 0.25rem 1rem;
        font-weight: 700;
        margin-top: 0.5rem;
        height: 2rem;
        width: fit-content;
    }

    .dark-badge{
        background-color: #000;
        color: #fff;
    }
    .sticky-nav{
        position: sticky;
        top: 0;
        background-color: #121212;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 1rem 0 1rem 0;
    }

    .sticky-nav-icons{
        margin-left: 0.75rem;
    }
    .sticky-nav-options{
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .nav-item{
        margin-right: 1rem;
    }
    @media (max-width: 1000px){
        .hide{
            display: none;
        }
    }
    </style>
</head>
<body>
    <div class="main">
        <div class="sidebar">
            <div class="nav">
                <div class="nav-option" style="opacity: 1;">
                    <i class="fa-solid fa-house"></i>
                    <a href="#">Home</a>
                </div>
                <div class="nav-option">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <a href="#">Search</a>
                </div>
            </div>
            <div class="library">
                <div class="options">
                   <div class="lib-options nav-option">
                    <img src="./Assets/library_icon.png">
                    <a href="#">Your Library</a>
                   </div>
                   <div class="icons">
                    <i class="fa-solid fa-plus"></i>
                    <i class="fa-solid fa-arrow-right"></i>
                   </div>
                </div>
                <div class="lib-box">
                    <div class="box">
                        <p class="box_p1">Create your first playlist</p>
                        <p class="box_p2">It's easy, we'll help you</p>
                        <button class="badge">Create playlist</button>
                    </div>
                    <div class="box">
                        <p class="box_p1">Let's find some podcasts to follow</p>
                        <p class="box_p2">We'll keep you updated on new episodes</p>
                        <button class="badge">Browse podcasts</button>
                    </div>
                </div>
            </div>
        </div>
        <div class="main-content">
            <div class="sticky-nav">
                <div class="sticky-nav-icons">
                    <img src="./Assets/backward_icon.png">
                    <img src="./Assets/forward_icon.png" class="hide">
                </div>
                <div class="sticky-nav-options">
                    <button class="badge nav-item hide">Explore Premium</button>
                    <button class="badge nav-item dark-badge"><i class="fa-solid fa-circle-arrow-down" style="margin-right: 5px;"></i>Install Apps</button>
                    <i class="fa-solid fa-user nav-item"></i>
                </div>
                
            </div>
            <div class="card"></div>
        </div>
        <div class="music-player">music-player</div>
    </div>
</body>
</html>
