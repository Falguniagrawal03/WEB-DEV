<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation</title>
    <style>
        .box{
            height: 100px;
            width: 300px;
            background-color: pink;
        }
        @keyframes fontAnimation{
            from{font-size: 20px;}
            to{
                font-size: 40px;
            }
        }
    </style>
</head>
<body>
    <h1>Animation</h1>
    <div class="box">This is a box</div>
</body>
</html>
