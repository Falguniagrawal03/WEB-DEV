<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise-2</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300&display=swap');
        *{
            margin: 0;
            padding: 0;
        }
        body{
            background-color: grey;
            padding: 60px
        }
        .card{
            background-color: white;
            height: 400px;
            width: 250px;
            border-radius: 7px;
            padding: 0 0 65px 0 ;
        }
        .card-img{
            padding: 5px;
        }
        .card-img img{
            border-radius: 7px;
        }
        .content{
            padding: 14px;
            font-family: "Poppins", sans-serif;
            font-weight: 300;
            font-style: normal;
        }
        .content p{
            font-size: 14px;
            color: grey;
        }
        .capsules{
            padding: 0 15px 0 15px;
        }
        .capsules span{
            color: grey;
            border: 1px solid grey;
            padding: 0px 6px;
            border-radius: 10px;
            font-size: 15px;
            font-family: 'Baloo Bhai 2', sans-serif;
        }
        .button{
            text-align: center;
            padding: 10px;
        }
        .button button{
            padding: 10px 15px ;
            background-color: aqua;
            color: white;
            border-radius: 15px;
            border: none;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="card-img">
            <img width="240" src="https://images.unsplash.com/photo-1778166188937-0fb2393ab8cd?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxmZWF0dXJlZC1waG90b3MtZmVlZHwxMHx8fGVufDB8fHx8fA%3D%3D">
        </div>
        <div class="capsules">
            <span>Nature</span>
            <span>Calm</span>
        </div>
        <div class="content">
            <h2>OCEAN</h2>
            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit.
               Alias necessitatibus nulla quibusdam corrupti et rerum obcaecati vero!
               Have a marvellous day ahead!</p>
        </div>
        <div class="button">
            <button>Read more</button>
        </div>
</body>
</html>
