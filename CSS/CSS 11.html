<!-- Tranform -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transform</title>
    <style>
        section{
            margin-top: 20px;
        }
        div{
            height:50px;
            width: 150px;
            background-color: rgba(227, 231, 15, 0.701);
            border: 2px solid black;
            text-align: center;
            margin: 20px auto;
            margin-top: 75px;
        }
        div:nth-of-type(2n){
            background-color: rgba(228, 26, 67, 0.678);
        }
        div:nth-of-type(3n){
            background-color: rgba(232, 116, 7, 0.772);
        }
        #one{
            transform: rotate(45deg);
        }
        #two{
            transform: scale(0.5);
        }
        #three{
            transform: translateX(-100px);
            box-shadow: 2px 2px 10px green;
        }
        #four{
            transform: skew(-30deg);
        }
        #five{
            transform: rotate(30deg) translateX(-150px);
        }
    </style>
</head>
<body>
    <section>
        <div id="one">one</div>
        <div id="two">two</div>
        <div id="three">three</div>
        <div id="four">four</div>
        <div id="five">five</div>
    </section>
</body>
</html>
