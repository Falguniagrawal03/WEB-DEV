<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position</title>
    <style>
        div{
            height:100px;
            width:100px;
            background-color: green;
            border: 2px solid black;
            display: inline-block;
            margin: 10px;
            text-align: center;
        }
        #static{
            background-color: yellow;
            position: static;
            top: 100px;
            left: 100px;
        }
        #relative{
            background-color: yellow;
            position: relative;
            top: 100px;
            left: 100px;
        }
        #absolute{
            background-color: yellow;
            position: absolute;
            top: 100px;
            left: 100px;
        }
        #fixed{
            background-color: yellow;
            position: fixed;
            top: 100px;
            left: 100px;
        }
        #sticky{
            background-color: yellow;
            position: sticky;
            top: 100px;
            left: 100px;
        }
    </style>
</head>
<body>
    <section>
        <h2>Static Demo</h2>
        <div></div>
        <div id="static"></div>
    </section>
    <section>
        <h2>Relative Demo</h2>
        <div></div>
        <div id="relative"></div>
        <div></div>
    </section>
    <section>
        <h2>Absolute Demo</h2>
        <div></div>
        <div id="absolute">absolute</div>
        <div></div>
    </section>
    <section>
        <h2>Fixed Demo</h2>
        <div></div>
        <div id="fixed">fixed</div>
    </section>
     <section>
        <h2>Sticky Demo</h2>
        <div></div>
        <div id="Sticky">Sticky</div>
    </section>
</body>
</html>
