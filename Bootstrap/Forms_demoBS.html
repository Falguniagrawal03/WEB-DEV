<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div>Container
        <h1>Form Demo</h1>
        <form>
            <div class="row">
                <div class="mb-3 col-md-6">
                    <label class="form-label" for="email">email</label>
                    <input type="text" class="form-control" placeholder="email" id="email"/>
                </div>
                
                <div class="mb-3 col-md-6">
                    <label class="form-label-" for="password">password</label>
                    <input type="text" class="form-control" placeholder="password" id="password">
                </div>
            </div>
           
            
            
            <div class="mb-3">
                <select class="from-select">
                    <option selected>Choose your city</option>
                    <option value="1">Mumbai</option>
                    <option value="2">Delhi</option>
                    <option value="3">Chennai</option>
                </select>
            </div>
            <div class="normal mb-3">
                <label for="agree">Agree</label>
                <input type="checkbox" id="agree">
            </div>
            <div class="mb-3 form-check">
                <input type="checkbox" id="agreebs" class="form-check-input">
                <label for="agreebs" class="form-check-label">Agree</label>
            </div>
            <div class="mb-3 form-check">
                <input type="radio" id="radiobs" class="form-check-input">
                <label for="radiobs" class="form-check-label">yes/no</label>
            </div>
             <div class="form-check form-switch mb-3">
                <input type="checkbox" role="switch" class="form-check-input" id="FlexSwitchCheckDefault">
                <label for="FlexSwitchCheckDefault" class="form-check-label">Default Switch Check Input</label>
            </div>
        </form>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
