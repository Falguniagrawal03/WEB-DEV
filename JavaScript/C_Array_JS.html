<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        
        ///Array
        let students = ["aman", "bhavesh", "suraj"];
        console.log(students);

        ///Visualizing the Array
        let nums = [2,4,6,8];
        console.log(nums);
        console.log(nums[0]);
        console.log(nums[3]);
        console.log(nums.length);
        console.log(typeof(nums));

        ///Creating Arrays
        let info = ['aman', 25, 6.1];    //mixed array
        console.log(info[0]);
        console.log(info[0][0]);
        console.log(info[0][1]);
        console.log(info[0].length);
        console.log(info.length);

        let empArr = [];    //empty array {0}
        console.log(empArr[0]);
        console.log(empArr.length);
        console.log([].length);

        ///Arrays are Mutable {changes in original array}
        let fruits = ['mango', 'apple', 'litchi'];
        fruits[0] = 'banana';
        console.log(fruits);
        fruits[10] = 'pineapple';
        console.log(fruits);

        ///Array Methods
        let cars = ['audi', 'bmw', 'xuv', 'maruti'];
        cars.push('toyota');          //PUSH: add at end
        console.log(cars);        
        cars.pop('toyota');           //POP: delete from end and return it
        console.log(cars); 
        cars.unshift('ferrari');      //UNSHIFT: add at start
        console.log(cars); 
        cars.shift('ferrari');        //SHIFT: delete from start and return it
        console.log(cars); 

        let followers = ['a', 'b', 'c']
        let blocked = followers.shift();
        console.log(followers);
        console.log(blocked);

        ///Practice Qs
        let months = ['jan', 'july', 'march', 'aug'];
        months.shift('jan');
        months.shift('july');
        months.unshift('june');
        months.unshift('july');
        console.log(months);

        ///indexOf {returns index of something} and includes {search for a value} Method
        let primary = ['red', 'yellow', 'blue'];
        console.log(primary.indexOf('yellow'));  //1
        console.log(primary.indexOf('green'));   //-1 (not found)

        console.log(primary.includes('red'));    //true
        console.log(primary.includes('green'));  //false

        ///Concatenation {concat: merge 2 arrays} and Reverse {reverse an array} Method
        let secondary = ['orange', 'pink', 'white'];
        console.log(primary.concat(secondary));
        console.log(secondary.concat(primary));

        console.log(primary.reverse());
        console.log(primary.concat(secondary).reverse());
        console.log(secondary.reverse());

        ///Slice Method  {copies a portion of an array}
        let colors = ['red', 'yellow', 'blue', 'orange', 'pink', 'white'];
        console.log(colors.slice());
        console.log(colors.slice(2));
        console.log(colors.slice(2,3));
        console.log(colors.slice(-2));

        ///Splice {removes/replaces/add elements in place} {splice(start, deleteCount, item0...itemN)}
        console.log(colors.splice());
        console.log(colors.splice(4));
        console.log(colors);                                    //[red, yellow, blue, orange]
        console.log(colors.splice(0,1));   
        console.log(colors);                                    //[ yellow, blue, orange]
        console.log(colors.splice(0,1, 'black', 'grey'));       
        console.log(colors);                                    //[black, grey, blue, orange]

        ///Practice Q1
        let month = ['jan', 'july', 'march', 'aug'];
        console.log(month.splice(0,2,'july', 'june'));
        console.log(month);
        ///Q2
        let lang = ['c', 'c++', 'html', 'JS', 'python', 'java', 'c#', 'sql'];
        console.log(lang.reverse().indexOf('JS'));
        
    </script>
</head>
<body>
    <h1>ARRAYS</h1>
</body>
</html>
