<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        ///for Loop --> for(initialisation, condition, updation){ // do something }
        for (let i=1; i<=5; i++){
            console.log(i);         //output(12345)
        }
        //backward
        for (let i=5; i>=1; i--){ 
            console.log(i);         //output(54321)
        }
        //Odd No.
        for (let i=1; i<=15; i++){      //OR  for (let i=1; i<=15; i=i+2) {1,3,5,7,9,11,13,15}
            if(i%2!=0){                 //OR  for (let i=15; i>=1; i=i-2) {15,13,11,9,7,5,3,1}
                console.log(i);
            }
        }
        //Even no.
        for (let i=1; i<=10; i++){      //OR  for (let i=2; i<=10; i=i+2) {2,4,6,8,10}
            if(i%2==0){                 //OR  for (let i=10; i>=2; i=i-2) {10,8,6,4,2}
                console.log(i);
            }
        }

    </script>
</head>
<body>
    <h1>LOOPS<h1>
</body>
</html>
