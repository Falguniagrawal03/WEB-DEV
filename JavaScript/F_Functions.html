        //Q5 create a func that returns the sum of numbers from 1 to n

            }

        //Q6 create a func that return the concatenation of all strings in an array
        let str = ['hi', 'hello', 'bye', '!'];
        function concat(str){

            }

        ///Function Scope & Global Scope
        function calSum(a,b){
            let sum = a+b;
        }
        calSum(1,2);        //error because sum is not defined inside 
        console.log(sum);   //error
        console.log("------------------------------------")

        function calSum(a,b){
            let sum = a+b;
            console.log(sum);
        }
        calSum(1,2);        //now 3 bcz sum is defined inside function
        console.log("------------------------------------")

        let sum1 = 54;               //Global Scope
        function calSum(a,b){
            let sum1 = a+b;
            console.log(sum1);       //Function Scope(Local)
        }
        calSum(1,5);          // 6
        console.log(sum1);    // 54

        //Lexical Scope
        function outerFunc(){
            let x = 5;
            let y = 6;
            function innerFunc(){
                console.log(x);
                console.log(y);
            }
            innerFunc();
        }
        outerFunc();
        console.log("------------------------------------")

        //This is called HOISTING {will give the same output no chnges even if we write the var outside the func}
        function outerFunc(){ 
            function innerFunc(){
                console.log(x);
                console.log(y);
            }
            let x = 5;
            let y = 6;

            innerFunc();
        }
        outerFunc();

        //Q7 {what will be the output}
        let greet = 'hello';            //Global Scope
        function changeGreet(){
            let greet = 'namaste';      //Function Scope
            console.log(greet);
            function innerGreet(){
                console.log(greet);     //Lexical Scope
            }
        }
        console.log(greet);           //output from global scope --> hello
        changeGreet();                // changeGreet func called --> namaste
        console.log("------------------------------------")

        let greet1 = 'hello';            //Global Scope
        function changeGreet1(){
            let greet1 = 'namaste';      //Function Scope
            console.log(greet1);
            function innerGreet1(){  
                console.log(greet1);     //Lexical Scope
            }
            innerGreet1();              //output from innerGreet call --> 3)namaste
        }
        console.log(greet1);           //output from global scope --> 1)hello
        changeGreet1();                //changeGreet func called --> 2)namaste
        console.log("------------------------------------")
        
        //Functions Expressions
        let name1 = 'shreyash';
        let c = 5;

        let summ = function(a,b){
            return a+b;
        }
        //summ(4,8);          //write in console will give the output.

        let hello1 = function(){
            console.log('hello');
        }
        hello1();
        console.log("------------------------------------")

        //High Order Functions  {dusre func ko as an argument le rha h}
        let Greet = function(){
            console.log('hello');
        }
        Greet();
        Greet();
        console.log("------------------------------------")

        //to overcome this baar-baar call prblm
        function multipleGreet(func, count){      //high-order func(dusre func ko as an arg le rha )
            for(let i=1; i<=count; i++){
                func();
            }
        }
        let Greett = function(){
            console.log('hello');
        }
        multipleGreet(Greett, 10);  //humesha func ki defn ko bhejna h calling ko nhi 
        multipleGreet(function() {console.log('namaste')}, 2);
        console.log("----------------multiple times--------------------")

        //High Order Functions (Returns)   //Custom func made
        function oddorEvenFactory(request){
            if(request == 'odd')
            {
                let odd = function(n)
                {
                console.log(!(n%2 == 0));
                }
                return odd;
            }
            else if(request == 'even')
            {
                let even = function(n)
                {
                console.log((n%2 == 0));
                }
                return even;
            }
            else{
                console.log('wrong request');
            }
        }
        let request = 'odd';  // or even
        let func = oddorEvenFactory(request);
        //func(3)   //call in console
