        //Q2 {Write a JS function to extract unique characters from a string}
        let strr = 'abcdabcdefgggh';
        //function to get string with all unique characters
        function getUnique(strr){
            let ans = "";
            for(let i=0; i<strr.length; i++){
                let currChar = strr[i];
                if(ans.indexOf(currChar) == -1){
                    //if current char is not added then add it in ans 
                    //otherwise it is a duplicate
                    ans += currChar;
                }
            }
            return ans;
        }
        console.log(getUnique(strr));
        console.log("------------------------------------")

        //Q3 {write a JS function that accepts a list of country names as input and returns the longest country name as output}
        let country = ['Australia', 'Germany', 'United States of America'];
        function longestName(country){
            let ansIdx = 0;
            for (let i=0; i<country.length; i++){
                let ansLen = country[ansIdx].length;
                let currLen = country[i].length;
                if(currLen > ansLen){
                    ansIdx = i;
                }
            }
            return country[ansIdx];
        }
        console.log(longestName(country));
        console.log("------------------------------------")

        //Q4 {write a JS function to count the number of vowels in a string argument}
        let str2 = 'apnaCollege';
        function countVowels(str2){
            let count = 0;
            for(let i=0; i<str2.length; i++){
                if(
                    str2.charAt(i) == 'a' ||
                    str2.charAt(i) == 'e' ||
                    str2.charAt(i) == 'i' ||
                    str2.charAt(i) == 'o' ||
                    str2.charAt(i) == 'u' 
                ) {
                    count++;
                }   
            }
            return count;
        }
        console.log(countVowels(str2));
        console.log("------------------------------------")

            return Math.floor(Math.random() * diff) + start;
        }
