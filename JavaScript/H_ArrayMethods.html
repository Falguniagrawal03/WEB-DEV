<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>

        //Array Methods
        //1) forEach {executes code for each element without returning anything}
        // let arr = [1,2,3,4,5];
        // let print = function(ele){
        //     console.log(ele);
        // };
        // arr.forEach(print);
        let arr = [1,2,3,4,5];
        arr.forEach(function(ele){
            console.log(ele);
        });
        console.log('-------------Normal func-----------------');

        let arr1 = [1,2,3,4,5];
        arr1.forEach( (el) => {
            console.log(el);
        });
        console.log('-------------Arrow func-----------------');

        let arr2 = [ 
            {
                name: 'avya',
                marks: 97
            }, 
            {
                name: 'rajat',
                marks: 94
            }, 
            {
                name: 'shruti',
                marks: 92
            },
           ];
        arr2.forEach((student) => {
            console.log(student);
            console.log(student.name);
        });
        console.log('--------------forEach------------------')

        //2) map {transforms each element & returns a brand new array of the same length}
        let num = [1,2,3,4];
        let double = num.map( (el) => {
            return el*2;
        });
        console.log(double);
        console.log('-------------Map-------------------')

        let students = [ 
            {
                name: 'aman',
                marks: 97
            }, 
            {
                name: 'ram',
                marks: 94
            }, 
            {
                name: 'sneha',
                marks: 92
            },
        ];
        let gpa = students.map( (el) => {
            return el.marks / 10;
        });
        console.log(gpa);
        console.log('-----------------Map------------------')

        //3) filter {filter retruns a new array containing only the elements that meet a specific condition}
        let nums = [1,2,3,5,7,4,6,9,8,10,12,11];
        let ans = nums.filter( (el) => {
            return el%2 == 0 ;  //even -> true, off -> false
            //return el%2 !=0;  // return el<5;
        });
        console.log(ans);
        console.log('--------------filter------------------')

        //4) every {true or false..checking if all items pass a condition}
        let n1 = [1,2,3,4];
        let ans1 = n1.every( (el) => (el%2 == 0));  //all should be true{like AND}
        console.log(ans1);
        console.log('------------every---------------------')

        //5) some {true or false..checking if atleast one item passes a condition}
        let n2 = [1,2,3,4];
        let ans2 = n2.some( (el) => (el%2==0));     //atleast one should be true{like OR} 
        console.log(ans2);
        console.log('-------------some---------------------')

        //6) reduce {a single accumulated value..combining elements into one final result}
        let n3 = [1,2,3,4];
        let finalVal = n3.reduce( (res,el) => {
            // console.log(res);
            return res+el;
        });
        console.log(finalVal);
        console.log('------------reduce---------------------')

        //Finding maximum in array
        //With Loop
        let array = [1,2,4,7,3,5,8,6,9,2];
        let max = -1;    //or 0
        for(let i=0; i<array.length; i++){
            if(max < array[i]){
                max = array[i];
            }
        }   
        console.log(max);
        console.log('--------------------------------')
        //With Reduce
        let array1 = [1,2,4,7,3,5,8,6,9,2,11];
        let maxResult = array1.reduce( (max, el) => {
            if(max < el){
                return el;
            }
            else{
                return max;
            }
        });
        console.log(maxResult);
        console.log('---------------------------------')

        //Practice Qs
        //Q1 {check if all the num in an array are multiples of 10 or not}
        let num1 = [10,20,30,40];
        let res1 = num1.every( (el) => (el%10==0));
        console.log(res1);
        console.log('---------------------------------')

        //Q2 {create a function to find the min number in an array}
        let num2 = [2,5,3,7,9,1,6,8];
        let minResult = num2.reduce( (min, el) => {
            if(min < el){
                return min;
            }
            else{
                return el;
            }
        });
        console.log(minResult);
        console.log('---------------------------------')

        //as a function
        function getMin(num2) {
            let minResult = num2.reduce( (min, el) => {
            if(min < el){
                return min;
            }
            else{
                return el;
            }
        });
            return minResult;
        }
        console.log(getMin(num2));
        console.log('---------------------------------')

        //default parameters
        function sum(a, b=3){
            return a+b;
        }
        console.log(sum(2));
        console.log('--------------Default Parameters-------------------')

        //Spread(...) {expands an iterable into multiple values}
        console.log(...'apnacollege');
        let a = [1,2,3,4,5,6];
        console.log(...a);
        console.log('-------------SPREAD--------------------')

        //Spread with Array Literals
        let arrr = [1,2,3,4,5];
        let newArr = [...arrr];
        console.log(newArr);

        let chars = [...'hello'];
        console.log(chars);

        let odd = [1,3,5,7,9];
        let even = [2,4,6,8,10];
        let numss = [...odd, ...even];      //order matters
        console.log(numss);
        console.log('--------------SPREAD with Array literals-------------------')

        //Spread with Object Literals
        let data = {
            email : 'ironman@gmail.com' ,
            pswd : 'abcd',
        };
        let dataCopy = {...data, id: 123, country: 'India'};
        console.log(dataCopy);
        console.log('---------------------------------')

        //array and str can also be stored in obj and spread
        let ar = [1,2,3,4,5,6];   //needs only value
        let obj1 = {...ar};       //needs key:value pair so will give index place n value
        let obj2 = {...'hello'};    //this is str obj same will give index as key
        console.log(obj1);
        console.log(obj2);
        console.log('---------------SPREAD with Obj literals------------------')

        //Rest {reduce from multiple to single value opp. of spread}
        function sum(...args){
            for(let i=0; i<args.length; i++){
                console.log('you gave us:', args[i]);
            }
        }
        sum(2,3);
        console.log('--------------REST-------------------')

        function min(a,b,c,d){
            console.log(arguments);  //will run
        }
        min(1,2,3,4);

        function min(){
            console.log(arguments);  //this will also run when no argu are passed 
            console.log(arguments.length);
        }
        min(1,2);
        console.log('---------------------------------')

        // function sum(){
        //     return arguments.reduce((add,el) => add+el);    //Error bcz arguments.reduce is not a function
        // }

        function summ(...args){
             return args.reduce((add,el) => add+el);    //no error
        }
        console.log(summ(5,7));
        console.log('---------------------------------')

        function minn(msg, ...args){
            console.log(msg);
            return args.reduce((min,el) => {
                if(min < el){
                    return min;
                }
                else{
                    return el;
                }
            });
        }
        console.log(minn('hello',38,96,400));
        console.log('---------------REST------------------')

        //Destructuring {storing values of arrays into multiple variables} arrays[]
        let names = ['Tony', 'Bruce', 'Steve', 'Peter', 'abc', 'xyz'];
        // let winner = names[0];
        // let runnerup = names[1];
        let [winner, runnerup, ...others] = names;
        console.log(winner, runnerup, others);  //'Tony' 'Bruce' (3)[steve peter abc xyz]
        console.log('---------------REST------------------')

        //Destructuring with Objects{}
        const stud = {
            name: 'karan',
            age: 15,
            class: '10th',
            subjects: ['eng', 'hindi', 'math', 'sci'],
            username: 'karan@123',
            password : 'abcd'
        };
        // let username = stud.username;
        // let password = stud.password;
        let {username, password} = stud;
        console.log(username, password);
        // let {username : user, password: secret, city: place = 'mumbai'} = stud; 
        //here password and username is not defined so it will take the values as assigned user and secret as defined and give the info.
        console.log('---------------DESTRUCTURING ------------------')

        //Assignment Questions
        //Q1 {sqr and sum array elements using arrow func then find the avg of the arr}
        let b = [1,2,3,4,5];
        let sqr = b.map((el) => el*el);
        console.log(sqr);
        let sum1 = b.reduce((acc, cur) => acc+cur);
        console.log(sum1);
        let avg1 = sum1 / b.length;
        console.log(avg1);
        console.log('------------------------------------------')

        //Q2 {create a new array using map func whose each element is equal to the original element plus 5}
        c = [2,4,6,3,-2,-7];
        let newArray = c.map((el) => el+5);
        console.log(newArray);
        console.log('------------------------------------------')

        //Q3 {create a new array whose element are in uppercase of words present in the original array}
        let strings = ["adam", "bob", "catlyn", "donald", "eve"];
        console.log(strings.map((el) => el.toUpperCase()));
        console.log('------------------------------------------')

        //Q4 {Write a func called doubleAndReturnArgs which accepts an array and a variable number of arguments. The function should return a new array with the original array values and all of the additional arguments doubled}
        const doubleAndReturnArgs = (arr, ...args) => [...arr, ...args.map((v) => v*2),];
        console.log(doubleAndReturnArgs ([1,2,3],4,4));     //[1,2,3,8,8]
        console.log(doubleAndReturnArgs ([2],10,-4));      //[2,20,16]
        console.log('------------------------------------------')

        //Q5 {Write a func called mergeObjects that accepts two objects and returns a new object which contains all the keys and values of the first object and second object}
        const mergeObjects = (object1, object2) => ({...object1, ...object2});
        console.log(mergeObjects({a:1, b:2}, {c:3, d:4})); 
        console.log('------------------------------------------')
        
    </script>
</head>
<body>
    <h1>Array methods, Default Parameters, Spread, Rest, Destructuring</h1>
</body>
</html>
